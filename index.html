<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>.drm – серебряный мессенджер</title>
  <!-- Шрифты и иконки -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Стили -->
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/layout/auth.css">
  <link rel="stylesheet" href="css/layout/sidebar.css">
  <link rel="stylesheet" href="css/layout/chat-area.css">
  <link rel="stylesheet" href="css/layout/responsive.css">
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/inputs.css">
  <link rel="stylesheet" href="css/components/avatars.css">
  <link rel="stylesheet" href="css/components/modals.css">
  <link rel="stylesheet" href="css/components/messages.css">
  <link rel="stylesheet" href="css/components/wall-posts.css">
  <link rel="stylesheet" href="css/themes/dark-silver.css">
</head>
<body>
  <div id="app">
    <!-- Экран загрузки (будет скрыт после инициализации) -->
    <div id="loading" class="loading-screen">
      <div class="loader"></div>
      <span>.drm</span>
    </div>

    <!-- Контейнер для авторизации (будет заполнен через JS) -->
    <div id="auth-container" class="screen" style="display: none;"></div>

    <!-- Основной интерфейс мессенджера (будет заполнен через JS) -->
    <div id="main-container" class="screen" style="display: none;"></div>
  </div>

  <!-- Модальное окно (глобальное) -->
  <div id="modal-overlay" class="modal-overlay"></div>
  <div id="modal-container" class="modal-container"></div>

  <!-- Подключаем главный модуль приложения -->
  <script type="module" src="js/core/app.js"></script>
</body>
</html>
