<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>.drm — мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Экран загрузки -->
        <div id="loading" class="loading-screen">Загрузка...</div>
        
        <!-- Экран авторизации -->
        <div id="auth-screen" class="screen auth-screen" style="display: none;">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>.drm</h1>
                    <p>мессенджер для своих</p>
                </div>
                <div id="auth-forms">
                    <!-- Динамически рендерится через JS -->
                </div>
            </div>
        </div>

        <!-- Основной интерфейс мессенджера -->
        <div id="main-screen" class="screen main-screen" style="display: none;">
            <!-- Левая панель (список чатов) -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="user-profile" id="userProfileBtn">
                        <div class="avatar" id="currentUserAvatar"></div>
                        <div class="user-info">
                            <span id="currentUserTag"></span>
                            <span class="status">онлайн</span>
                        </div>
                    </div>
                    <button class="icon-btn" id="newChatBtn"><i class="fas fa-edit"></i></button>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск чата или пользователя...">
                </div>
                <nav class="chat-tabs">
                    <button class="tab-btn active" data-tab="chats">Чаты</button>
                    <button class="tab-btn" data-tab="users">Пользователи</button>
                </nav>
                <div class="chat-list-container" id="chatListContainer">
                    <!-- Динамический список -->
                </div>
            </aside>

            <!-- Основная область чата -->
            <main class="chat-area" id="chatArea">
                <div class="chat-header" id="chatHeader">
                    <button class="mobile-back-btn" id="mobileBackBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-info" id="chatInfo">
                        <div class="avatar" id="chatAvatar"></div>
                        <div class="chat-details">
                            <h3 id="chatTitle">Выберите чат</h3>
                            <p id="chatSubtitle"></p>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="icon-btn" id="chatMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <div class="empty-chat-message">
                        <i class="fas fa-comments"></i>
                        <p>Выберите чат или создайте новый</p>
                    </div>
                </div>
                <div class="message-input-area" id="messageInputArea" style="display: none;">
                    <button class="icon-btn"><i class="far fa-smile"></i></button>
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button class="send-btn" id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>

        <!-- Модальные окна -->
        <div id="modal-overlay" class="modal-overlay" style="display: none;"></div>
        <div id="modal-container" class="modal-container"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
